<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPix ChaT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Reset Dasar */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Quicksand', sans-serif; 
        }

        /* Latar Belakang Gradasi Hijau WhatsApp */
        body { 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(135deg, #075E54, #128C7E, #25D366);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            overflow: hidden; 
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Container Utama */
        .wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 500px;
            padding: 20px;
        }

        /* Teks Utama iPix ChaT dengan Efek Glassy Bold */
        .glass-title {
            font-size: 3.5rem;
            font-weight: 800; 
            margin-bottom: 25px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.35);
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            text-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.15),
                inset 0 2px 4px rgba(255, 255, 255, 0.2);
            padding: 5px 30px;
            z-index: 2;
        }

        /* Kapsul Kaca (Capsule Glass) */
        .capsule-glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 35px 50px; 
            border-radius: 100px; 
            text-align: center; 
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.2),
                inset 0 1px 2px rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            z-index: 2;
            margin-bottom: 20px;
        }

        /* Teks Di Dalam Kapsul - Glassy Calm */
        .capsule-glass p {
            font-size: 1.5rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(18, 140, 126, 0.4);
        }

        /* Container Loading Bar */
        .loading-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 100px;
            padding: 5px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Bar Loading Memanjang Hijau Stabilo Kalem */
        .loading-bar {
            height: 10px;
            width: 0%;
            background: linear-gradient(90deg, #25D366, #34D399, #00FF87);
            border-radius: 100px;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.7);
            animation: loadProgress 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            50% { width: 75%; }
            100% { width: 100%; }
        }

        /* Gelembung Hijau di Area Tengah Belakang */
        .bubble {
            position: absolute;
            background: rgba(37, 211, 102, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(37, 211, 102, 0.25);
            border-radius: 50%;
            z-index: 1;
            animation: float 7s ease-in-out infinite;
            box-shadow: 0 0 25px rgba(37, 211, 102, 0.1);
        }

        /* Posisi Gelembung */
        .bubble-1 { width: 140px; height: 140px; top: -15px; left: -25px; animation-delay: 0s; }
        .bubble-2 { width: 180px; height: 180px; bottom: -35px; right: -25px; animation-delay: 2s; }
        .bubble-3 { width: 90px; height: 90px; top: 45%; left: -55px; animation-delay: 4s; animation-duration: 5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            50% { transform: translateY(-12px) scale(1.04) rotate(8deg); }
        }
    </style>

    <script type="text/javascript">
        window.$crisp=[];
        window.CRISP_WEBSITE_ID="a23603f3-1d3e-4482-9304-f23df40093df";
        (function(){
            d=document;
            s=d.createElement("script");
            s.src="https://client.crisp.chat/l.js";
            s.async=1;
            d.getElementsByTagName("head")[0].appendChild(s);
        })();

        // Memaksa chat langsung terbuka saat siap
        window.onload = function() {
            var checkCrisp = setInterval(function() {
                if (typeof $crisp !== "undefined") {
                    $crisp.push(["do", "chat:open"]);
                    clearInterval(checkCrisp);
                }
            }, 500);
        };
    </script>
</head>
<body>

    <div class="wrapper">
        
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>

        <div class="glass-title">iPix ChaT</div>

        <div class="capsule-glass">
            <p>Mohon tunggu sebentar...</p>
            
            <div class="loading-container">
                <div class="loading-bar"></div>
            </div>
        </div>

    </div>

</body>
</html>
