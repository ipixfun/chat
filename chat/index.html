<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPix ChaT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Quicksand', sans-serif; 
        }

        body { 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(135deg, #075E54, #128C7E, #25D366);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            overflow: hidden; 
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 500px;
            padding: 20px;
        }

        /* Pill dengan Garis Tipis Elegan */
        .top-pill {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-decoration: none;
            margin-bottom: 15px;
            padding: 12px 34px;
            border-radius: 50px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            border: 1.5px solid rgba(255, 255, 255, 0.5); /* Garis tipis */
            box-shadow: 0 8px 25px rgba(0,0,0,0.2),
                        inset 0 2px 6px rgba(255,255,255,0.3);
            transition: all 0.4s ease;
            z-index: 3;
        }

        .top-pill:hover {
            border-color: rgba(255, 255, 255, 0.85);
            background: rgba(255,255,255,0.18);
            transform: scale(1.04);
        }

        .glass-title {
            font-size: 3.4rem;
            font-weight: 800; 
            margin-bottom: 25px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.32);
            -webkit-text-stroke: 1.8px rgba(255, 255, 255, 0.55);
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 2;
        }

        .capsule-glass {
            background: rgba(255, 255, 255, 0.09);
            backdrop-filter: blur(30px);
            padding: 35px 50px; 
            border-radius: 100px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25),
                        inset 0 1px 2px rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            z-index: 2;
        }

        .capsule-glass p {
            font-size: 1.55rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 25px;
        }

        .loading-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 100px;
            padding: 5px;
        }

        .loading-bar {
            height: 10px;
            width: 0%;
            background: linear-gradient(90deg, #25D366, #34D399, #00FF87);
            border-radius: 100px;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.8);
            animation: loadProgress 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            50% { width: 78%; }
            100% { width: 100%; }
        }

        .domain-links a {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            margin: 0 15px;
            text-decoration: none;
            transition: 0.3s;
        }

        .domain-links a:hover {
            color: white;
            text-shadow: 0 0 12px rgba(255,255,255,0.6);
        }

        .bubble {
            position: absolute;
            background: rgba(37, 211, 102, 0.18);
            border: 1px solid rgba(37, 211, 102, 0.3);
            border-radius: 50%;
            z-index: 1;
            animation: float 8s ease-in-out infinite;
        }

        .bubble-1 { width: 150px; height: 150px; top: -20px; left: -30px; }
        .bubble-2 { width: 190px; height: 190px; bottom: -40px; right: -30px; animation-delay: 2.5s; }
        .bubble-3 { width: 95px; height: 95px; top: 48%; left: -60px; animation-delay: 4s; }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>

        <!-- Pill dengan garis tipis mengelilingi -->
        <a href="https://ipix.my.id" target="_blank" class="top-pill">
            ipix.my.id
        </a>

        <div class="glass-title">iPix ChaT</div>

        <div class="capsule-glass">
            <p>Mohon tunggu sebentar...</p>
            
            <div class="loading-container">
                <div class="loading-bar"></div>
            </div>
        </div>

        <div class="domain-links" style="margin-top: 25px;">
            <a href="https://ipix.fun" target="_blank">ipix.fun</a>
        </div>

    </div>

</body>
</html>
